<header> <h1>MENU DESIGN 2 </h1></header>

<style>
    header{
        text-align:center;
        box-shadow:10px 10px 10px;
                background:rgb(3, 35, 44);
                color:white;

    }
    #menu
    {box-shadow:4px 4px 4px gray;

        width:25px;

        cursor:pointer;

    }

    ol
    {list-style:none;
        display:none;


    }
    #menu:hover
    {
        width:100px;
    }
    #menu:hover ol
    {display:block;}
    li 
    {//background:red;
    padding:10px;
     cursor:pointer;
    margin-left:-40px;
     color:whhite;
    }
    li hover 
    {background:balck;}
    </style>


<body>
    <main>
        <div id="menu">
            <span style="background:rgb(51, 46, 46)" class="material-symbols-outlined"><img src="images/menu.JPEG" ALT="menu"width="30"></span>
             <ol>
                <li>home</li>

                <li>services</li>

             
             </ol>



    </main>
